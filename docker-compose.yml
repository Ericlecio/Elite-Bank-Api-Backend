services:
  kafka:
    image: confluentinc/confluent-local:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"

  postgres:
    image: postgres:15-alpine
    container_name: banco_digital_db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=bancodigital